services:
  # ============================================================================
  # PostgreSQL - Time-Series & Transactional Data
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: zarqa-postgres
    environment:
      POSTGRES_USER: zarqa
      POSTGRES_PASSWORD: zarqa_pass
      POSTGRES_DB: zarqa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U zarqa" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zarqa-network

  # ============================================================================
  # Qdrant - Vector Database for News/Reports Embeddings
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: zarqa-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT_API_KEY: qdrant_api_key
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - zarqa-network

  # ============================================================================
  # Neo4j - Knowledge Graph Database
  # ============================================================================
  neo4j:
    image: neo4j:5.13-community
    container_name: zarqa-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j_pass
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_pass", "RETURN 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zarqa-network

  # ============================================================================
  # Redis - Cache & Session State
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: zarqa-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis_pass
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zarqa-network

  # ============================================================================
  # FastAPI Backend
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zarqa-backend
    environment:
      DATABASE_URL: postgresql://zarqa:zarqa_pass@postgres:5432/zarqa_db
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_pass
      REDIS_URL: redis://:redis_pass@redis:6379
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - zarqa-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Next.js Frontend
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zarqa-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/.next
    networks:
      - zarqa-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  redis_data:
    driver: local

networks:
  zarqa-network:
    driver: bridge
